<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta description="基于四值逻辑的解谜闯关游戏：推断每关隐藏的条件">
  <title>猜条件 · 解谜闯关</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="menu-bar" role="menubar">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true">
          <i></i><i></i><i></i>
        </span>
        <div>
          <p class="eyebrow">Pattern Guessing</p>
          <h1>猜条件</h1>
        </div>
      </div>

      <nav class="menu-bar-items" aria-label="主菜单">
        <div class="menu-item" data-menu="level">
          <button class="menu-trigger" type="button" aria-haspopup="true" aria-expanded="false">关卡</button>
          <ul class="menu-dropdown" role="menu" hidden>
            <li role="none"><button role="menuitem" data-window="level-picker" type="button">选关</button></li>
            <li role="none" class="menu-submenu">
              <button role="menuitem" aria-haspopup="true" type="button">提示</button>
              <ul class="menu-dropdown menu-dropdown-sub" role="menu" hidden>
                <li role="none"><button role="menuitem" data-action="load-example" type="button">载入示例</button></li>
                <li role="none"><button role="menuitem" data-window="level-hint" type="button">查看提示</button></li>
              </ul>
            </li>
            <li role="none"><button role="menuitem" data-window="checkpoint" type="button">通关检测</button></li>
            <li role="none"><button role="menuitem" data-window="level-editor" type="button">关卡编辑器</button></li>
          </ul>
        </div>

        <div class="menu-item" data-menu="game">
          <button class="menu-trigger" type="button" aria-haspopup="true" aria-expanded="false">游戏</button>
          <ul class="menu-dropdown" role="menu" hidden>
            <li role="none"><button role="menuitem" data-window="text-format" type="button">导入 / 导出</button></li>
            <li role="none"><button role="menuitem" data-window="variables" type="button">查看变量</button></li>
          </ul>
        </div>

        <div class="menu-item" data-menu="extension">
          <button class="menu-trigger" type="button" aria-haspopup="true" aria-expanded="false">扩展</button>
          <ul class="menu-dropdown" role="menu" hidden>
            <li role="none"><button role="menuitem" data-window="extensions-placeholder" type="button">暂无扩展</button></li>
          </ul>
        </div>

        <div class="menu-item" data-menu="help">
          <button class="menu-trigger" type="button" aria-haspopup="true" aria-expanded="false">帮助</button>
          <ul class="menu-dropdown" role="menu" hidden>
            <li role="none"><button role="menuitem" data-window="manual" type="button">积木手册</button></li>
          </ul>
        </div>
      </nav>

      <div class="menu-bar-spacer"></div>

      <div class="menu-bar-run">
        <span class="run-status" id="run-status" data-state="idle">
          <span class="status-dot"></span>
          <span>等待运行</span>
        </span>
        <button class="button button-run" id="run-button" type="button">
          <span class="play-icon" aria-hidden="true"></span>
          运行逻辑
        </button>
      </div>
    </header>

    <main class="editor-layout">
      <aside class="panel library-panel" aria-labelledby="library-heading">
        <div class="panel-heading library-heading">
          <div>
            <p class="section-kicker">BLOCKS</p>
            <h2 id="library-heading">积木仓库</h2>
          </div>
          <span class="count-badge">12 种</span>
        </div>
        <p class="library-tip">拖动积木到工作区，或点击积木快速添加。</p>
        <div id="block-library" class="block-library"></div>
      </aside>

      <div class="workspace-column">
        <section class="panel workspace-panel" aria-labelledby="workspace-heading">
          <div class="panel-heading workspace-heading">
            <div class="workspace-title">
              <div>
                <p class="section-kicker">WORKSPACE</p>
                <h2 id="workspace-heading">逻辑工作区</h2>
              </div>
              <div class="tab-bar" id="tab-bar" role="tablist" aria-label="工作区切换"></div>
            </div>
            <div class="workspace-meta">
              <span id="command-count" hidden>0 条指令</span>
              <span class="keyboard-hint">双击积木可删除</span>
              <button class="clear-button" id="clear-button" type="button" aria-label="清空工作区" title="清空工作区">清空</button>
            </div>
          </div>

          <div class="workspace-scroll">
            <div id="workspace" class="workspace" data-accept="command" tabindex="0" aria-label="指令投放区">
              <div class="workspace-grid" aria-hidden="true"></div>
              <div class="empty-workspace" id="empty-workspace">
                <div class="empty-illustration" aria-hidden="true">
                  <span class="ghost-block ghost-command"></span>
                  <span class="ghost-block ghost-predicate"></span>
                  <span class="ghost-block ghost-value"></span>
                </div>
                <h3>把第一块逻辑积木放在这里</h3>
                <p>从左侧拖入“赋值”或“回答”指令，开始搭建推理流程。</p>
                <button class="inline-action" id="empty-example-button" type="button">载入一个完整示例</button>
              </div>
              <div id="command-stack" class="command-stack" aria-live="polite"></div>
            </div>
          </div>

          <div class="trash-zone" id="trash-zone" aria-label="积木删除区">
            <span class="trash-icon" aria-hidden="true"></span>
            <span>拖到这里删除</span>
          </div>
        </section>
      </div>

      <aside class="panel answer-panel" aria-labelledby="answer-heading">
        <div class="panel-heading compact">
          <div>
            <p class="section-kicker">ANSWERS</p>
            <h2 id="answer-heading">回答</h2>
          </div>
          <span class="count-badge" id="result-count">0</span>
        </div>
        <div class="result-pane">
          <div class="result-list answer-list" id="answer-list" aria-live="polite">
            <div class="empty-small answer-empty">
              <span>?</span>
              <p>“回答”指令的推理结果会出现在这里。</p>
            </div>
          </div>
        </div>
        <div class="logic-legend" aria-label="四值逻辑图例">
          <span data-logic="T"><b>T</b> 是</span>
          <span data-logic="F"><b>F</b> 否</span>
          <span data-logic="U"><b>U</b> 不确定</span>
          <span data-logic="I"><b>I</b> 无法回答</span>
        </div>
      </aside>
    </main>

    <nav class="taskbar" id="taskbar" aria-label="已打开窗口"></nav>
  </div>

  <div class="window-host" id="window-host" aria-hidden="false"></div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="logic-engine.js"></script>
  <script src="data-bundle.js"></script>
  <script src="app.js"></script>
</body>
</html>
